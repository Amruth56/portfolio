<header class="d-flex justify-content-between gap-3 bg-dark border-bottom border-3">
    <p class="fs-14 fw-bold hover-pointer m-3 text-warning" (click)="selected('home')">🏠HOME</p>
   
    <ul class="d-flex gap-4 text-white m-3 list-unstyled">
        <li class="fs-14 fw-semibold hover-pointer" (click)="selected('internship')">Internships</li>
        <li class="fs-14 fw-semibold hover-pointer" (click)="selected('project')">Projects</li>
        <li class="fs-14 fw-semibold hover-pointer" (click)="selected('skill')">Skills</li>
        <li class="fs-14 fw-semibold hover-pointer" (click)="selected('achievement')">Achievements</li>
    </ul>
</header>

<div #home id="home" class="">
    <app-home></app-home>
</div>
<div #internship id="internship" class="">
    <app-internships></app-internships>
</div>
<div #project id="project" class="">
    <app-projects></app-projects>
</div>
<div #skill id="skill" class="">
    <app-skills></app-skills>
</div>
<div #achievement id="achievement" class="">
    <app-acheivements></app-acheivements>
</div>
